<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Mary Pastelaria — Cardápio</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@500;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f3f0;
      --surface: #ffffff;
      --primary: #E61A25;
      --primary-dark: #B8141E;
      --primary-soft: rgba(230, 26, 37, 0.07);
      --primary-muted: #c0383e;
      --primary-muted-soft: rgba(192, 56, 62, 0.09);
      --text: #1E1B18;
      --text-light: #5a524a;
      --border: #ddd6cc;
      --nav-bg: rgba(245, 243, 240, 0.97);
      --hero-from: #6b0d11;
      --hero-to: #b5161c;
      --bg-solid: #f5f3f0;
    }

    :root.dark {
      --bg: #12100E;
      --surface: #1a1816;
      --primary: #E61A25;
      --primary-dark: #B8141E;
      --primary-soft: rgba(230, 26, 37, 0.10);
      --primary-muted: #b8484c;
      --primary-muted-soft: rgba(184, 72, 76, 0.11);
      --text: #f0ebe4;
      --text-light: #9a9088;
      --border: #2e2922;
      --nav-bg: rgba(18, 16, 14, 0.97);
      --hero-from: #2a0406;
      --hero-to: #7a0d12;
      --bg-solid: #12100E;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background: var(--bg-solid);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
      line-height: 1.3;
    }

    .hero {
      background: linear-gradient(180deg, var(--hero-from) 0%, var(--hero-to) 45%, var(--bg-solid) 95%);
      padding-bottom: 16px;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 20px 8px;
    }

    .brand-logo {
      display: block;
      width: min(90vw, 500px);
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    }

    .hero-info {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .brand-contact {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .brand-addr {
      font-size: 0.55rem;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .page {
      max-width: 600px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    .cat-nav {
      position: sticky;
      top: 0;
      z-index: 40;
      background: var(--nav-bg);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      padding: 0 12px;
      gap: 4px;
    }

    .cat-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 12px 4px 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
      border-bottom: 2px solid transparent;
      cursor: pointer;
      white-space: nowrap;
    }

    .cat-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      display: flex;
      align-items: center;
      padding: 12px 16px 4px;
    }

    .section-label h2 {
      font-size: 0.55rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
      font-weight: 700;
      white-space: nowrap;
    }

    /* linha separadora: ocupa o espaço restante à direita do título */
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      margin-left: 12px;
    }

    /* hints da seção: barra separada abaixo do título, largura do item-group */
    .section-hints {
      display: none;
      align-items: center;
      justify-content: space-between;
      margin: 0 12px 2px;
    }

    body.order-mode .section-hints {
      display: flex;
    }

    .section-hint-left {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.4;
      /* alinha com o botão − que tem padding 0 14px dentro de um container sem padding extra */
      padding-left: 8px;
    }

    .section-hint-right {
      display: flex;
      align-items: center;
      gap: 4px;
      opacity: 0.4;
      padding-right: 8px;
    }

    .section-hint-key {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 2px;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--text-light);
      line-height: 1;
      flex-shrink: 0;
    }

    .section-hint-label {
      font-size: 0.48rem;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-light);
      white-space: nowrap;
    }

    /* ── ITEM GROUP ── */
    .item-group {
      margin: 0 12px 8px;
      background: var(--surface);
      border-radius: 4px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .item {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .item:last-child { border-bottom: none; }

    .item-main {
      display: flex;
      align-items: center;
      min-height: 36px;
    }

    .item-controls {
      display: flex;
      align-items: center;
      height: 100%;
    }

    /* FIX 3 — hitbox ampliada: padding interno empurra a área de toque para dentro do item */
    .ctrl-btn {
      /* tamanho visual mínimo */
      min-width: 32px;
      height: 36px;
      /* padding extra para dentro → hitbox começa além do símbolo */
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      /* torna a área clicável mais fácil no touch */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .ctrl-btn:active { background: var(--primary-soft); }

    /* o separador de borda agora fica no container, não no botão */
    .item-controls:first-child { border-right: 1px solid var(--border); }
    .item-controls:last-child  { border-left:  1px solid var(--border); }

    .ctrl-count {
      width: 24px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary-muted);
    }

    .ctrl-count.zero { color: var(--border); }

    .item-left {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 4px 5px 10px;
      min-width: 0;
    }

    .item-marker {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }

    .item.in-cart .item-marker { background: var(--primary-muted); }

    .item-name {
      font-size: 0.77rem;
      font-weight: 500;
      color: var(--text);
      word-break: break-word;
      line-height: 1.3;
      flex: 1;
    }

    .item-price-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .item-qty-badge {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--primary-muted);
      white-space: nowrap;
    }

    .item-price {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-light);
      white-space: nowrap;
    }

    .item.premium .item-price { color: var(--primary-muted); }

    .item-obs-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      margin-right: 4px;
      cursor: pointer;
      color: var(--text-light);
      opacity: 0.4;
      flex-shrink: 0;
    }

    .item-obs-icon.active {
      opacity: 1;
      color: var(--primary-muted);
    }

    .item-obs-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
    }

    .item-obs-field {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.2s ease, opacity 0.15s ease;
      padding: 0 16px 0 48px;
    }

    .item-obs-field.open {
      max-height: 80px;
      opacity: 1;
      padding-bottom: 12px;
    }

    .item-obs-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 8px 10px;
      font-size: 0.7rem;
      color: var(--text);
      resize: none;
    }

    /* ── CART BAR ── */
    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      background: var(--surface);
      border-top: 2px solid var(--primary);
      padding: 12px 20px 24px;
      z-index: 100;
      transition: transform 0.25s ease;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
    }

    .cart-bar.hidden { transform: translateX(-50%) translateY(100%); }

    .cart-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-info { font-size: 0.8rem; color: var(--text-light); }
    .cart-info strong { color: var(--text); }

    .review-btn {
      background: var(--primary);
      border: none;
      border-radius: 4px;
      padding: 10px 16px;
      color: white;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    /* ── SUMMARY ── */
    .summary-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      z-index: 149;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .summary-overlay.open { opacity: 1; pointer-events: all; }

    .summary-sheet {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%) scale(0.95);
      width: calc(100% - 32px);
      max-width: 480px;
      background: var(--surface);
      border-radius: 6px;
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
    }

    .summary-sheet.open {
      transform: translate(-50%,-50%) scale(1);
      opacity: 1;
      pointer-events: all;
    }

    .summary-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .summary-title {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .summary-close {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: none;
      cursor: pointer;
      font-size: 1rem;
    }

    .summary-list { overflow-y: auto; padding: 8px 0; flex: 1; }

    .summary-row { padding: 12px 20px; border-bottom: 1px solid var(--border); }

    .summary-row-main { display: flex; align-items: center; gap: 12px; }

    .summary-row-name {
      flex: 1;
      font-size: 0.8rem;
      font-weight: 500;
      word-break: break-word;
    }

    .summary-row-qty { font-size: 0.7rem; font-weight: 700; color: var(--primary-muted); }

    .summary-row-price {
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem;
      min-width: 60px;
      text-align: right;
    }

    .summary-row-obs {
      font-size: 0.6rem;
      color: var(--text-light);
      font-style: italic;
      margin-top: 6px;
      padding-left: 8px;
      border-left: 2px solid var(--primary-muted);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--primary-soft);
    }

    .summary-total-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }

    .summary-total-value {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      cursor: pointer;
    }

    .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 0.6rem; font-weight: 600; }

    .toggle-switch { position: relative; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      transition: background 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: var(--text-light);
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .toggle-track { background: var(--primary); }
    input:checked + .toggle-track::after { transform: translateX(20px); background: white; }

    .summary-addr-wrap {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.25s ease, opacity 0.2s ease;
    }

    .summary-addr-wrap.open { max-height: 80px; opacity: 1; }

    .addr-input {
      width: calc(100% - 40px);
      margin: 0 20px 12px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
    }

    .send-btn {
      margin: 8px 20px 20px;
      padding: 14px;
      background: var(--primary);
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    /* ── WA READ BAR ── */
    .wa-read-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      background: var(--surface);
      border-top: 2px solid var(--primary);
      padding: 16px 20px 24px;
      z-index: 100;
    }

    body:not(.order-mode) .wa-read-bar { display: block; }

    .wa-read-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      background: #25D366;
      border-radius: 4px;
      color: white;
      text-decoration: none;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* ── FIX 1 + 2: INFO CARD ──
       Mesmo tamanho de tudo, só um gap entre os dois trecho de texto */
    .info-card {
      margin: 6px 12px 2px;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--primary-muted);
      border-radius: 0 3px 3px 0;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }

    .info-card-icon {
      color: var(--primary-muted);
      opacity: 0.7;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .info-card-icon svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
    }

    /* texto do card: dois spans com gap entre eles, mesma fonte/tamanho */
    .info-card-text {
      font-size: 0.62rem;
      color: var(--text-light);
      line-height: 1.5;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      column-gap: 10px; /* FIX 1: espaço mínimo entre as duas frases */
      row-gap: 0;
    }

    .info-card-text strong {
      color: var(--text);
      font-weight: 600;
    }

    /* "a confirmar" — badge pequeno inline, só aparece no modo pedido */
    .info-card-confirm {
      display: none;
      align-items: center;
      gap: 3px;
      font-size: 0.62rem; /* igual ao resto */
      font-weight: 600;
      color: var(--primary-muted);
    }

    body.order-mode .info-card-confirm { display: inline-flex; }

    /* separador e obs: só aparecem no modo pedido */
    .info-card-obs { display: none; }
    .info-card-sep { display: none; }

    body.order-mode .info-card-obs { display: inline; }
    body.order-mode .info-card-sep { display: inline; }

    /* ── INLINE CONTROLS ── */
    .inline-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 4px 12px 0;
      padding: 5px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      opacity: 0.7;
    }

    .inline-ctrl-mode {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }

    .inline-ctrl-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary-muted);
      opacity: 0.5;
      flex-shrink: 0;
      transition: background 0.2s, opacity 0.2s;
    }

    body.order-mode .inline-ctrl-dot { background: #4ade80; opacity: 1; }

    .inline-ctrl-label {
      font-size: 0.52rem;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--text-light);
      opacity: 0.75;
    }

    body.order-mode .inline-ctrl-label { color: #4ade80; opacity: 0.9; }

    .inline-ctrl-divider { width: 1px; height: 12px; background: var(--border); }

    .inline-ctrl-theme {
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }

    .inline-ctrl-theme-label {
      font-size: 0.52rem;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--text-light);
      opacity: 0.75;
    }

    .inline-ctrl-theme svg {
      width: 11px;
      height: 11px;
      stroke: var(--text-light);
      fill: none;
      opacity: 0.6;
    }

    :root .icon-moon-inline { display: none; }
    :root .icon-sun-inline  { display: block; }
    :root.dark .icon-moon-inline { display: block; }
    :root.dark .icon-sun-inline  { display: none; }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      padding: 32px 16px 20px;
      border-top: 1px solid var(--border);
    }

    .footer p { font-size: 0.55rem; color: var(--text-light); letter-spacing: 1px; opacity: 0.6; }

    /* ── MODO LEITURA (sem pedido) ── */
    body:not(.order-mode) .item-controls,
    body:not(.order-mode) .item-obs-icon,
    body:not(.order-mode) .item-obs-field { display: none; }

    body:not(.order-mode) .item-left { padding: 5px 14px 5px 14px; }
    body:not(.order-mode) .item-main { min-height: 28px; }
    body:not(.order-mode) .item-name { font-size: 0.75rem; font-weight: 400; }
    body:not(.order-mode) .item-price { font-size: 0.75rem; font-family: 'DM Sans', sans-serif; font-weight: 600; }
    body:not(.order-mode) .item-marker { display: none; }
    body:not(.order-mode) .item-group { border-radius: 2px; }
  </style>
</head>

<body>

  <div class="hero">
    <div class="hero-content">
      <img class="brand-logo" src="Assets/logo-banner-nbg.png" alt="Mary Pastelaria">
      <div class="hero-info">
        <a class="brand-contact" href="https://wa.me/5515996026387" target="_blank">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">

    <button class="send-btn" onclick="handleSend()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12.004 0C5.373 0 0 5.373 0 12.004c0 2.114.554 4.1 1.522 5.827L0 24l6.351-1.498A11.957 11.957 0 0012.004 24C18.63 24 24 18.627 24 12.004 24 5.373 18.63 0 12.004 0zm0 21.818a9.812 9.812 0 01-5.001-1.368l-.36-.214-3.72.876.916-3.617-.235-.372a9.82 9.82 0 01-1.507-5.119c0-5.425 4.412-9.837 9.837-9.837 5.426 0 9.837 4.412 9.837 9.837S17.43 21.818 12.004 21.818z"/>

  <script>
    const WA = '5515996026387';
    const DELIVERY_FEE = 3;

    const menu = {
      pasteis: {
        "Tradicionais": [
          { name: "Carne", price: 8 }, { name: "Queijo", price: 8 },
          { name: "Frango", price: 8 }, { name: "Pizza", price: 8 },
          { name: "Calabresa c/ Queijo", price: 10 }, { name: "Frango c/ Queijo", price: 10 },
          { name: "Frango c/ Queijo e Milho", price: 12 },
          { name: "Frango c/ Cheddar ou Catupiry", price: 10 },
          { name: "Carne c/ Queijo", price: 10 }
        ],
        "Especiais": [
          { name: "Costela", price: 15, premium: true }, { name: "Costela c/ Queijo", price: 15, premium: true },
          { name: "Bacon", price: 15, premium: true },
          { name: "X-Tudo", price: 15, premium: true }, { name: "X-Tudo c/ Ovo", price: 15, premium: true },
          { name: "Strogonoff de Frango", price: 15, premium: true },
          { name: "Carne Seca", price: 15, premium: true }, { name: "Carne Seca c/ Queijo", price: 15, premium: true },
          { name: "Pernil", price: 15, premium: true }
        ],
        "Doces": [
          { name: "Brigadeiro", price: 12 }, { name: "Prestígio", price: 12 },
          { name: "Doce de Leite", price: 12 }, { name: "Brigadeiro c/ Morango", price: 12 },
          { name: "Banana c/ Canela", price: 12 }, { name: "Banana c/ Chocolate", price: 12 },
          { name: "Nutella", price: 12 }
        ]
      },
      bebidas: {
        "Coca-Cola": [
          { name: "Coca-Cola Lata", price: 6 },
          { name: "Coca-Cola KS 300ml", price: 7 },
          { name: "Coca-Cola LS 600ml", price: 10 },
          { name: "Coca-Cola 2 Litros", price: 15 },
          { name: "Coca-Cola Mini 200ml", price: 3.50 }
        ],
        "Tubaína & Outros": [
          { name: "Tubaína Garrafa", price: 7 },
          { name: "Tubaína 350ml", price: 4.50 },
          { name: "Tubaína Lata", price: 5 },
          { name: "Guaraná Mini 200ml", price: 3.50 },
          { name: "Tampico", price: 7 },
          { name: "Nativo", price: 3.50 }
        ],
        "Água": [
          { name: "Água Natural", price: 3 },
          { name: "Água com Gás", price: 3.50 }
        ]
      }
    };

    const cart = new Map();
    let wantsDelivery = false;
    let orderMode = false;
    let currentCat = 'pasteis';

    const fmt = n => 'R$ ' + n.toFixed(2).replace('.', ',');
    const toId = s => s.replace(/[^a-z0-9]/gi, '_');

    function updateThemeLabel() {
      const isDark = document.documentElement.classList.contains('dark');
      const lbl = document.getElementById('theme-label-inline');
      if (lbl) lbl.textContent = isDark ? 'Tema claro' : 'Tema escuro';
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateThemeLabel();
    }

    (function () {
      document.documentElement.classList.add('dark');
      localStorage.setItem('theme', 'dark');
      updateThemeLabel();
    })();

    function renderMenu(cat) {
      const wrap = document.getElementById('menu-wrap');
      let html = '';

      Object.entries(menu[cat]).forEach(([section, items]) => {
        // hints: barra separada abaixo do título, − Remover à esq, Adicionar + à dir
        html += `
          <div class="section-label">
            <h2>${section}</h2>
          </div>
          <div class="section-hints">
            <span class="section-hint-left">
              <span class="section-hint-key">-</span>
              <span class="section-hint-label">Para remover</span>
            </span>
            <span class="section-hint-right">
              <span class="section-hint-label">E adicionar</span>
              <span class="section-hint-key">+</span>
            </span>
          </div>`;

        html += `<div class="item-group">`;

        items.forEach(item => {
          const id = toId(item.name);
          const cartItem = cart.get(id);
          const qty = cartItem ? cartItem.qty : 0;
          const obs = cartItem ? cartItem.obs || '' : '';

          html += `
            <div class="item${qty > 0 ? ' in-cart' : ''}${item.premium ? ' premium' : ''}" id="row-${id}">
              <div class="item-main">
                <div class="item-controls">
                  <button class="ctrl-btn" onclick="dec('${id}')">−</button>
                  <span class="ctrl-count${qty === 0 ? ' zero' : ''}" id="qty-${id}">${qty}</span>
                </div>
                <div class="item-left">
                  <span class="item-marker"></span>
                  <span class="item-name">${item.name}</span>
                  <div class="item-price-wrap">
                    ${qty > 0 ? `<span class="item-qty-badge" id="badge-${id}">${qty}×</span>` : ''}
                    <span class="item-price">${fmt(item.price)}</span>
                    <span class="item-obs-icon ${cartItem?.obs ? 'active' : ''}" onclick="toggleItemObs('${id}')">
                      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </span>
                  </div>
                </div>
                <div class="item-controls">
                  <button class="ctrl-btn" onclick="inc('${id}','${item.name.replace(/'/g,"\\'")}',${item.price})">+</button>
                </div>
              </div>
              <div class="item-obs-field ${cartItem?.obs ? 'open' : ''}" id="obs-field-${id}">
                <textarea class="item-obs-input" id="obs-${id}"
                  placeholder="Observação (opcional)"
                  onchange="updateItemObs('${id}', this.value)"
                  rows="1">${obs}</textarea>
              </div>
            </div>
          `;
        });

        html += `</div>`;
      });

      wrap.innerHTML = html;
    }

    function inc(id, name, price) {
      if (!orderMode) return;
      if (cart.has(id)) { cart.get(id).qty++; }
      else { cart.set(id, { name, price, qty: 1 }); }
      sync(id);
    }

    function dec(id) {
      if (!orderMode || !cart.has(id)) return;
      const item = cart.get(id);
      if (--item.qty <= 0) cart.delete(id);
      sync(id);
    }

    function toggleItemObs(id) {
      if (!orderMode) return;
      document.getElementById('obs-field-' + id)?.classList.toggle('open');
    }

    function updateItemObs(id, value) {
      if (!orderMode || !cart.has(id)) return;
      const item = cart.get(id);
      item.obs = value.trim() || undefined;
      const icon = document.querySelector(`#row-${id} .item-obs-icon`);
      item.obs ? icon?.classList.add('active') : icon?.classList.remove('active');
    }

    function sync(id) {
      const qty = cart.has(id) ? cart.get(id).qty : 0;
      const row   = document.getElementById('row-' + id);
      const ctr   = document.getElementById('qty-' + id);
      const badge = document.getElementById('badge-' + id);

      if (ctr) { ctr.textContent = qty; ctr.classList.toggle('zero', qty === 0); }

      if (badge) {
        if (qty > 0) { badge.textContent = qty + '×'; badge.style.display = 'inline'; }
        else { badge.style.display = 'none'; }
      }

      if (row) row.classList.toggle('in-cart', qty > 0);
      refreshBar();
    }

    function refreshBar() {
      const bar = document.getElementById('cart-bar');
      if (!cart.size || !orderMode) { bar.classList.add('hidden'); return; }
      bar.classList.remove('hidden');
      let total = 0, count = 0;
      cart.forEach(e => { total += e.price * e.qty; count += e.qty; });
      document.getElementById('cart-info').innerHTML =
        `<strong>${count} ${count === 1 ? 'item' : 'itens'}</strong> · ${fmt(total)}`;
    }

    function calculateSubtotal() {
      let total = 0;
      cart.forEach(e => total += e.price * e.qty);
      return total;
    }

    function onToggleDelivery(v) {
      wantsDelivery = v;
      document.getElementById('summary-addr-wrap').classList.toggle('open', v);
      updateSummaryTotal();
    }

    function updateSummaryTotal() {
      const subtotal = calculateSubtotal();
      const total = subtotal + (wantsDelivery ? DELIVERY_FEE : 0);
      document.getElementById('summary-total-value').textContent = fmt(total);
    }

    function openSummary() {
      const list = document.getElementById('summary-list');
      let rows = '';
      cart.forEach(e => {
        rows += `
          <div class="summary-row">
            <div class="summary-row-main">
              <span class="summary-row-name">${e.name}</span>
              <span class="summary-row-qty">${e.qty}×</span>
              <span class="summary-row-price">${fmt(e.price * e.qty)}</span>
            </div>
            ${e.obs ? `<div class="summary-row-obs">${e.obs}</div>` : ''}
          </div>`;
      });
      list.innerHTML = rows;
      updateSummaryTotal();
      document.getElementById('summary-sheet').classList.add('open');
      document.getElementById('summary-overlay').classList.add('open');
    }

    function closeSummary() {
      document.getElementById('summary-sheet').classList.remove('open');
      document.getElementById('summary-overlay').classList.remove('open');
    }

    function handleSend() {
      if (!cart.size) return;
      if (wantsDelivery && !document.getElementById('addr-input').value.trim()) {
        document.getElementById('addr-input').focus();
        return;
      }
      const subtotal = calculateSubtotal();
      const total = subtotal + (wantsDelivery ? DELIVERY_FEE : 0);
      const now = new Date();
      let lines = [
        `Olá! Gostaria de fazer um pedido 😊`,
        ``
      ];
      cart.forEach(e => {
        lines.push(`• ${e.qty}× ${e.name} — ${fmt(e.price * e.qty)}`);
        if (e.obs) lines.push(`  ↳ _${e.obs}_`);
      });
      lines.push('');
      if (wantsDelivery) lines.push(`Entrega: +${fmt(DELIVERY_FEE)}`);
      
      lines.push(`*Total: ${fmt(total)}*`);
      lines.push('');
      lines.push(wantsDelivery
        ? `📍 Endereço: ${document.getElementById('addr-input').value.trim()}`
        : `🏠 Vou retirar no local`);
      lines.push('');
      lines.push(`_Pedido em ${now.toLocaleDateString('pt-BR')} às ${now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}_`);
      window.open(`https://wa.me/${WA}?text=${encodeURIComponent(lines.join('\n'))}`, '_blank');
    }

    function selectCat(cat, btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = cat;
      renderMenu(cat);
    }

    function toggleMode() {
      orderMode = !orderMode;
      document.body.classList.toggle('order-mode', orderMode);
      const lbl = document.getElementById('mode-label-inline');
      if (lbl) lbl.textContent = orderMode ? 'Desativar modo pedido' : 'Ativar modo pedido';
      if (!orderMode) {
        cart.clear();
        wantsDelivery = false;
        document.getElementById('cart-bar').classList.add('hidden');
        document.getElementById('delivery-toggle').checked = false;
        document.getElementById('summary-addr-wrap').classList.remove('open');
        document.getElementById('addr-input').value = '';
        closeSummary();
      }
      renderMenu(currentCat);
    }

    renderMenu('pasteis');
  </script>
</body>
